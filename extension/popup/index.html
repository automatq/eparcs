<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scraped</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      min-height: 200px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #000;
      color: rgba(255, 255, 255, 0.87);
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .badge {
      background: #d4af37;
      color: #000;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 600;
    }
    .lead-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .lead-card {
      background: #0a0a0a;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .lead-card:hover {
      border-color: rgba(255, 255, 255, 0.2);
    }
    .lead-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .lead-detail {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.64);
      line-height: 1.4;
    }
    .lead-source {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 6px;
      border-radius: 4px;
      margin-top: 6px;
    }
    .source-linkedin { background: #1a3a5c; color: #5b9bd5; }
    .source-gmaps { background: #1a3c1a; color: #5bd55b; }
    .source-jobboard { background: #3c1a3c; color: #d55bd5; }
    .actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .btn {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-primary {
      background: rgba(255, 255, 255, 0.87);
      color: #0a0a0a;
    }
    .btn-secondary {
      background: #171717;
      color: rgba(255, 255, 255, 0.87);
    }
    .empty {
      text-align: center;
      padding: 32px 16px;
      color: rgba(255, 255, 255, 0.64);
      font-size: 13px;
      line-height: 1.5;
    }
    .signal-badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-top: 4px;
    }
    .signal-high { background: #3c1a1a; color: #ef4444; }
    .signal-medium { background: #3c2a1a; color: #f59e0b; }
    .signal-low { background: #1a3c1a; color: #22c55e; }
    .status { font-size: 12px; text-align: center; padding: 8px; color: #22c55e; }
    .error { color: #ef4444; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Scraped</h1>
    <span class="badge" id="count">0</span>
  </div>
  <div id="content">
    <div class="empty">
      Browse LinkedIn, Google Maps, or Indeed to capture leads.
    </div>
  </div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
